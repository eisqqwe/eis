<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  text-align: center;
  font-family: sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color: white;
}

.container {
  margin-top: 100px;
  position: relative;
  z-index: 2;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  margin-top: 15px;
}

#surprise {
  display: none;
  margin-top: 30px;
}

.gift, .wishBox {
  margin-top: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  display: inline-block;
}

/* ซ่อนคำอวยพร */
#wishBox {
  display: none;
}

/* แมวตามเมาส์ */
#catFollower {
  position: fixed;
  width: 70px;
  pointer-events: none;
}

/* หัวใจ */
.heart {
  position: fixed;
  color: #ff4d6d;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<img id="catFollower" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">

<div class="container">
  <h1>HBD nongmaysa </h1>


  <button onclick="show()">กดรับของขวัญ 🎁</button>

  <div id="surprise">
    <h2>🎉 ยินดีด้วยอยากได้ล่ะสิ 🎉</h2>

    <!-- บัตร -->
    <div class="gift" id="giftBox">
      <h3>💌 บัตรหายงอน 1 ครั้ง 💌</h3>
      <img src="eis.png" style="width:150px;border-radius:15px;">
      <p>ไม่ใช้จะดีที่สุด</p>
    </div>

    <!-- คำอวยพร (ซ่อนก่อน) -->
    <div class="wishBox" id="wishBox">
      <h3>อืมมมมมมมม</h3>
      <p>24 ปีแล้วสินะ</p>
      <p>ขอให้ไม่มีเรื่องปวดหัวเข้ามาอยู่เล่นด้วยกันนานนนนนนนนๆๆ</p>
      <p>ต่อไปนี้ก็ขอให้เจอแต่เรื่องดีๆ เช่น </p>
       <img src="eis.png" style="width:150px;border-radius:15px;">
    </div>

    <br>
    <button onclick="nextPage()">กดถัดไป 💌</button>
  </div>
</div>

<script>
// ปุ่มแรก
function show(){
  document.getElementById("surprise").style.display="block";
}

// ปุ่มถัดไป → สลับ
function nextPage(){
  document.getElementById("giftBox").style.display="none";
  document.getElementById("wishBox").style.display="inline-block";
}

// แมวตามเมาส์
const cat = document.getElementById("catFollower");
document.addEventListener("mousemove", (e)=>{
  cat.style.left = e.clientX + "px";
  cat.style.top = e.clientY + "px";
});

// หัวใจ
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100+"vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
